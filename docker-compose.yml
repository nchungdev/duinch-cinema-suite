services:
  # --- JDownloader Node (For NAS/Server) ---
  jdownloader:
    image: jlesage/jdownloader-2
    container_name: jdownloader
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5800:5800" # Web UI
      - "9666:9666" # Local API (FlashGot)
    volumes:
      - ./data/jdownloader/config:/config
      - ${HOST_STORAGE_PATH:-./data/downloads}:/output
    environment:
      - KEEP_APP_RUNNING=1
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=720

  # --- Core Infrastructure ---
  duinch-db:
    image: postgres:15-alpine
    container_name: duinch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duinch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-duinch}
      POSTGRES_DB: ${POSTGRES_DB:-duinch_db}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duinch -d duinch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  duinch-cache:
    image: redis:alpine
    container_name: duinch-cache
    restart: unless-stopped
    ports:
      - "6379:6379"

  # --- Web Application Stack ---
  duinch-api:
    build: 
      context: ./duinch-cinema/backend
    container_name: duinch-api
    restart: unless-stopped
    depends_on:
      duinch-db:
        condition: service_healthy
      duinch-cache:
        condition: service_started
    ports:
      - "8086:8086"
    environment:
      - MYJD_EMAIL=${MYJD_EMAIL}
      - MYJD_PASSWORD=${MYJD_PASSWORD}
      - TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}
      - REDIS_URL=redis://duinch-cache:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-duinch}:${POSTGRES_PASSWORD:-duinch}@duinch-db:5432/${POSTGRES_DB:-duinch_db}
      - DATA_ROOT=/app/data
    volumes:
      - ${HOST_STORAGE_PATH}:/storage
      - ./data:/app/data

  duinch-ui:
    build:
      context: ./duinch-cinema/web
    container_name: duinch-ui
    restart: unless-stopped
    depends_on:
      - duinch-api
    ports:
      - "8087:80"

  duinch-downloader:
    build:
      context: ./duinch-downloader
    container_name: duinch-downloader
    restart: unless-stopped
    environment:
      - MYJD_EMAIL=${MYJD_EMAIL}
      - MYJD_PASSWORD=${MYJD_PASSWORD}
      - JD_DEVICE_NAME=${JD_DEVICE_NAME:-JDownloader}
      - JD_DOWNLOAD_PATH=${JD_DOWNLOAD_PATH:-/output/DuinchCinema}
    ports:
      - "8088:8088"

  # --- Crawler Workers (Scale as needed) ---
  duinch-miner:
    build: 
      context: ./duinch-crawler
    container_name: duinch-miner
    restart: "no"
    depends_on:
      - duinch-db
      - duinch-cache
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-duinch}:${POSTGRES_PASSWORD:-duinch}@duinch-db:5432/${POSTGRES_DB:-duinch_db}
      - REDIS_URL=redis://duinch-cache:6379
    command: ["python3", "miner/main.py", "--pages", "1"]
    profiles: ["workers"]

  duinch-cooker:
    build: 
      context: ./duinch-crawler
    container_name: duinch-cooker
    restart: "no"
    depends_on:
      - duinch-db
      - duinch-cache
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-duinch}:${POSTGRES_PASSWORD:-duinch}@duinch-db:5432/${POSTGRES_DB:-duinch_db}
      - REDIS_URL=redis://duinch-cache:6379
    command: ["python3", "cooker/main.py", "--limit", "100"]
    profiles: ["workers"]
